services:
  frontend:
    build: !reset null
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --port 80 --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - VITE_API_URL=${VITE_API_URL:-}
    read_only: false
    tmpfs: []
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  frontend_node_modules:
